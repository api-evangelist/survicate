name: Survicate API Rate Limits
description: Survicate enforces two rate limiting measures on the Data Export API — a cap on concurrent simultaneous requests and a per-workspace per-minute request ceiling. Exceeding either limit returns a 429 Too Many Requests response.
url: https://developers.survicate.com/data-export/setup/
created: "2026-06-13"
modified: "2026-06-13"
rateLimits:
  - name: Concurrent Requests Limit
    description: The maximum number of simultaneous (concurrent) API requests allowed at any one time across your workspace.
    limit: 5
    unit: concurrent requests
    scope: workspace
    errorCode: 429
    errorMessage: Too Many Requests
    notes: Applies globally across all API endpoints in the Data Export API. Requests beyond this threshold are rejected until in-flight requests complete.
  - name: Per-Minute Request Cap
    description: The maximum number of API requests permitted per minute for each workspace regardless of concurrency.
    limit: 1000
    unit: requests/minute
    scope: workspace
    errorCode: 429
    errorMessage: Too Many Requests
    notes: This is a rolling per-minute window applied per workspace. Exceeding 1000 requests in any 60-second window triggers a 429 response. Back off and retry after the window resets.
headers:
  - name: Authorization
    description: Basic authentication header using the workspace API key. Format is "Basic {{apiKey}}" where the key is retrieved from the Survicate panel under Surveys Settings > Access Keys.
    required: true
errorCodes:
  - code: 429
    description: Too Many Requests — either the concurrent request limit (5) or the per-minute cap (1000 req/min) has been exceeded. Implement exponential backoff before retrying.
recommendations:
  - Implement request queuing to stay within the 5 concurrent request limit.
  - Use exponential backoff when receiving 429 responses.
  - Batch and paginate requests to stay well under the 1000 requests/minute workspace ceiling.
  - Cache frequently requested survey structures locally to reduce redundant API calls.
